# DISABLED: pr-classify.yml + claude-review.yml 로 통합됨
# Two-Way Door PR은 claude-review.yml 의 two-way-claude-review job이 담당한다.
# 이 파일은 수동 실행(workflow_dispatch)으로만 접근 가능하도록 제한한다.

name: Claude Code Review (Disabled — manual only)

on:
  workflow_dispatch:

jobs:
  claude-review:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
      issues: read
      id-token: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Run Claude Code Review
        id: claude-review
        uses: anthropics/claude-code-action@v1
        with:
          claude_code_oauth_token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          plugin_marketplaces: 'https://github.com/anthropics/claude-code.git'
          plugins: 'code-review@claude-code-plugins'
          prompt: '/code-review:code-review ${{ github.repository }}/pull/${{ github.event.pull_request.number }}'
